<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>智慧听写助手 · 手写记录版</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<button class="theme-toggle" id="themeToggle">🌙</button>
<div class="app-container" id="app">
    <!-- 首页 -->
    <div id="pageHome" class="page active">
        <div class="header">
            <h1>✍️ 智慧听写助手</h1>
            <p style="opacity:0.9; margin-top: 6px; font-size: 0.9rem;" id="welcomeUser"></p>
        </div>
        <div class="card"><h3>🎯 快速听写</h3>
            <div class="flex-row" style="margin-top: 12px;">
                <button class="btn btn-primary" data-dictate="chinese">📝 语文预置</button>
                <button class="btn btn-success" data-dictate="english">🇬🇧 英语预置</button>
                <button class="btn btn-outline" data-dictate="custom">✨ 我的词库</button>
            </div>
        </div>
        <div class="card"><h3>📊 今日战绩</h3>
            <div class="stats-grid">
                <div><div class="stat-num" id="todayCorrect">0</div><div>完成词语</div></div>
                <div><div class="stat-num" id="todayRate">0%</div><div>完成率</div></div>
            </div>
        </div>
        <div class="card"><h3>📝 手写记录</h3>
            <button class="btn btn-outline" data-page="pageRecords">🖌️ 查看本次听写记录</button>
        </div>
        <div class="card"><h3>⚙️ 个性化设置</h3>
            <button class="btn btn-outline" data-page="pageSettings">🔧 语音/次数/模式</button>
            <button class="btn btn-outline" style="margin-top: 10px;" data-page="pageCustomManager">📚 自定义词库 + 一键生成</button>
        </div>
    </div>

    <!-- 听写页面 -->
    <div id="pageDictation" class="page">
        <div class="header" style="padding: 14px 20px;">
            <button class="back-btn" data-exit-dictation>← 返回</button>
            <h1 id="dictTitle">语文听写</h1>
        </div>
        <div style="padding: 10px 12px;">
            <div class="card dictate-card">
                <div style="font-size: 1rem; color:#475569;">第 <span id="curIdx">1</span> / <span id="totalWords">0</span> 个</div>
                <div class="big-hint" id="wordDisplayHint">🎧 听写进行中</div>
                
                <!-- 普通模式按钮行（默认显示） -->
                <div class="flex-row" id="normalBtnRow" style="justify-content: center; gap: 12px;">
                    <button class="btn btn-primary" id="playVoiceBtn">🔊 播放语音</button>
                    <button class="btn btn-outline" id="modeActionBtn">⚡ 开始/重播</button>
                    <button class="btn btn-info" id="hintBtn">❓ 疑难提示</button>
                </div>

                <!-- 纯听模式专用按钮行（默认隐藏） -->
                <div class="flex-row" id="pureListenBtnRow" style="justify-content: center; gap: 12px; display: none;">
                    <button class="btn btn-primary" id="purePlayVoiceBtn">🔊 播放语音</button>
                    <button class="btn btn-primary" id="pureModeActionBtn">⚡ 开始/重播</button>
                    <button class="btn btn-outline" id="pureHintBtn">❓ 疑难提示</button>
                    <button class="btn btn-outline" id="pureNextBtn">⏩ 下一词</button>
                </div>
                
                <!-- 动态输入区域（田字格或普通输入框） -->
                <div id="dynamicInputArea"></div>

                <!-- 第二组按钮：提交、跳过、清空等（仅非纯听模式显示） -->
                <div class="flex-row" style="justify-content: center; gap: 12px; margin-top: 8px;" id="actionBtnRow">
                    <button class="btn btn-success" id="submitBtn">💾 保存并继续</button>
                    <button class="btn btn-primary" id="nextBtn" style="display: none;">⏩ 下一词</button>
                    <button class="btn btn-outline" id="skipBtn" style="display: none;">⏭️ 跳过</button>
                    <button class="btn btn-outline" id="clearInputBtn">🧽 清空</button>
                </div>

                <div id="dictResultArea" class="result-badge"></div>
                <div id="hintArea" class="hint-message" style="display: none;"></div>
                <div class="stats-grid" style="margin-top: 12px;">
                    <div>📝 已保存: <strong id="sessionCorrect">0</strong></div>
                    <div>📌 剩余: <strong id="sessionRemain">0</strong></div>
                </div>
                <div id="autoStatusTip" style="font-size: 12px; background: #f0f6fe; padding: 8px; border-radius: 40px; margin-top: 10px;"></div>
            </div>
        </div>
    </div>

    <!-- 手写记录页面 -->
    <div id="pageRecords" class="page">
        <div class="header"><button class="back-btn" data-page="pageHome">← 返回</button><h1>🖌️ 听写记录</h1></div>
        <div class="card">
            <div id="recordList" class="record-list"></div>
            <div class="flex-row" style="margin-top: 16px;">
                <button class="btn btn-outline" id="clearRecordsBtn">🗑️ 清空本次记录</button>
                <button class="btn btn-primary" id="exportRecordsBtn">📎 导出图片包</button>
            </div>
        </div>
    </div>

    <!-- 设置页面 -->
    <div id="pageSettings" class="page">
        <div class="header"><button class="back-btn" data-page="pageHome">← 返回</button><h1>⚙️ 听写设置</h1></div>
        <div class="card">
            <div class="setting-item"><span>🔊 自动播放次数</span><input type="number" id="settingPlayCount" min="1" max="5" value="3"></div>
            <div class="setting-item"><span>⏱️ 播放间隔(秒)</span><input type="number" id="settingIntervalSec" min="1" max="6" step="0.5" value="3"></div>
           <div class="setting-item"><span>🗣️ 语速 (0.5x - 2x)</span><div><input type="range" id="settingRate" min="0.5" max="2" step="0.05" value="1"><span id="rateValue" class="range-value">1.0</span></div></div>
            <div class="setting-item"><span>🎙️ 语音性别</span><select id="settingVoiceGender" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;"><option value="female">女声 (温柔)</option><option value="male">男声 (清晰)</option></select><button id="testVoiceBtn" style="margin-left:8px;padding:8px 12px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer;" type="button">🔊 测试</button></div>
            <div class="setting-item"><span>🔈 选择语音</span><select id="voiceSelector" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;"><option value="">自动选择</option></select></div>
            <div id="currentVoiceInfo" style="font-size:12px;color:#666;margin-top:-8px;padding-left:8px;">当前语音：加载中...</div>
            <div class="setting-item"><span>🤖 听写模式</span><select id="dictationMode"><option value="auto">自动模式 (保存后自动播放下一个)</option><option value="manual">手动模式 (手动下一词)</option></select></div>
            <div class="setting-item"><span>🎧 纯听模式 (隐藏输入)</span><label><input type="checkbox" id="listeningOnlyMode"> 开启后只听不写</label></div>
            <div class="setting-item" id="autoWaitGroup"><span>⏲️ 自动提交等待(秒)</span><input type="number" id="autoWaitSec" min="1" max="8" value="2"></div>
            <button class="btn btn-primary" style="width:100%" id="saveSettingsBtn">💾 保存设置</button>
        </div>
    </div>

    <!-- 自定义词库管理 -->
    <div id="pageCustomManager" class="page">
        <div class="header"><button class="back-btn" data-page="pageHome">← 返回</button><h1>📚 我的词库</h1></div>
        <div class="card"><h3>✨ 粘贴内容 一键生成听写作业</h3>
            <textarea id="pasteTextArea" rows="3" placeholder="支持中英文混合，用空格、逗号或换行分隔&#10;例如：苹果 banana 快乐  school"></textarea>
            <div class="flex-row" style="margin: 10px 0;">
                <button class="btn btn-primary" id="generateFromPasteBtn">⚡ 生成新词库并听写</button>
                <button class="btn btn-outline" id="appendToCurrentBtn">📥 追加到当前词库</button>
            </div>
            <hr style="margin: 12px 0;">
            <div class="flex-row" style="justify-content: space-between;"><h3>📖 我的词库列表</h3><button class="btn btn-outline" id="newCustomSetBtn">➕ 新建词库</button></div>
            <div id="customSetList" style="margin-top: 12px;"></div>
            <div style="margin-top: 16px;"><button class="btn btn-success" id="startSelectedCustomBtn">🎧 使用当前词库听写</button></div>
        </div>
    </div>

    <!-- 词库编辑模态框 -->
    <div id="editSetModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000;">
        <div style="background:white;border-radius:12px;width:90%;max-width:400px;max-height:80vh;overflow:hidden;">
            <div class="header" style="padding:12px 16px;border-bottom:1px solid #eee;"><span style="flex:1;">✏️ 编辑词库</span><button onclick="closeEditModal()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">×</button></div>
            <div style="padding:16px;">
                <div style="margin-bottom:12px;">
                    <label style="display:block;margin-bottom:4px;font-weight:bold;">词库名称</label>
                    <input type="text" id="editSetName" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;">
                </div>
                <div style="margin-bottom:12px;">
                    <label style="display:block;margin-bottom:4px;font-weight:bold;">词语列表（每行一个词）</label>
                    <textarea id="editSetWords" rows="8" placeholder="苹果&#10;香蕉&#10;apple&#10;happy" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;"></textarea>
                </div>
                <div class="flex-row" style="gap:10px;">
                    <button class="btn btn-outline" onclick="closeEditModal()">取消</button>
                    <button class="btn btn-primary" onclick="saveEditSet()">保存</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
